name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      error_log: ${{ steps.build.outputs.error_log }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++
        
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      id: build
      run: |
        # 尝试构建，保存输出
        if ! cmake --build build 2>&1; then
          ERROR_LOG=$(cmake --build build 2>&1 || true)
          echo "error_log=$ERROR_LOG" >> $GITHUB_OUTPUT
          echo "Build failed with error:"
          echo "$ERROR_LOG"
          exit 1
        fi
      
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
      
    - name: Run application
      run: ./build/hello_ci

  # 🤖 Build Failure Agent - 当构建失败时自动分析
  agent:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        pip install PyGithub
      
    - name: Run Build Failure Agent
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
        BUILD_ERROR: ${{ needs.build.outputs.error_log }}
      run: |
        # 把错误日志写入文件
        echo "$BUILD_ERROR" > /tmp/build_error.log
        
        # 运行 Agent
        python - agent/build_agent.py /tmp/build_error.log

    - name: Notify result
      run: |
        echo "🤖 Agent analysis complete. Check the logs above."