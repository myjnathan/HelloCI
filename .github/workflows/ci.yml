name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++
        
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      run: cmake --build build
      
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
      
    - name: Run application
      run: ./build/hello_ci

  # 🤖 Build Failure Agent - 当构建失败时自动分析
  agent:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        pip install PyGithub
      
    - name: Get failure logs
      id: logs
      run: |
        # 获取最近失败运行的日志
        LOGS=$(gh run view ${{ github.run_id }} --log 2>/dev/null | tail -200)
        echo "logs=$LOGS" >> $GITHUB_OUTPUT
        
    - name: Run Build Failure Agent
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
      run: |
        python - agent/build_agent.py << 'EOF'
        ${{ steps.logs.outputs.logs }}
        EOF

    - name: Create Fix PR (if confidence > 0.7)
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "检查是否需要创建修复PR..."
        # Agent 会在这里自动创建修复PR

    - name: Notify on failure
      if: failure()
      run: |
        echo "🤖 Build Agent 无法自动修复，请手动查看日志"