name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++
        
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      run: cmake --build build
      
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
      
    - name: Run application
      run: ./build/hello_ci

  # 🤖 Build Failure Agent - 当构建失败时自动分析
  agent:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        pip install PyGithub
      
    - name: Get failure info
      id: info
      run: |
        # 获取构建失败的日志
        echo "Fetching build logs..."
        
        # 使用 GitHub API 获取日志
        LOGS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs 2>/dev/null | head -200 || echo "Could not fetch logs")
        
        # 或者直接获取构建输出
        BUILD_OUTPUT=$(gh run view ${{ github.run_id }} --log 2>/dev/null | tail -100)
        
        echo "$BUILD_OUTPUT" > /tmp/build_log.txt
        echo "log_file=/tmp/build_log.txt" >> $GITHUB_OUTPUT
        
    - name: Run Build Failure Agent
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
      run: |
        python - agent/build_agent.py /tmp/build_log.txt

    - name: Notify result
      if: always()
      run: |
        echo "🤖 Agent analysis complete. Check the logs above for details."